server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — every route serves index.html so /d/:key works on refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache the hashed asset bundles.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
