name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: be
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: be/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Migrations apply cleanly
        run: npm run migration:run
        env:
          DATABASE_PATH: ./data/ci.sqlite
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run build
      - name: OpenAPI spec is committed & current
        env:
          NODE_ENV: test
        run: |
          npm run openapi:export
          git diff --exit-code openapi.json ../fe/src/lib/api/openapi.json \
            || { echo "::error::OpenAPI drift — run 'cd be && npm run openapi:export' and commit."; exit 1; }

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: fe/package-lock.json
      - run: npm ci
      - name: Generated API client is committed & current
        run: |
          npm run api:generate
          git diff --exit-code src/lib/api/generated \
            || { echo "::error::API client drift — run 'cd fe && npm run api:generate' and commit."; exit 1; }
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: |
          npm ci --prefix be
          npm ci --prefix fe
          npm ci --prefix e2e
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Run e2e
        run: npx playwright test
        working-directory: e2e
        env:
          CI: '1'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: e2e/screenshots
          if-no-files-found: ignore

  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger backend deploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_BE_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "COOLIFY_BE_WEBHOOK not set — skipping deploy."; exit 0; fi
          curl --fail --silent --show-error -X POST "$WEBHOOK" -H "Authorization: Bearer $TOKEN"
      - name: Trigger frontend deploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_FE_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "COOLIFY_FE_WEBHOOK not set — skipping deploy."; exit 0; fi
          curl --fail --silent --show-error -X POST "$WEBHOOK" -H "Authorization: Bearer $TOKEN"
